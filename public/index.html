<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBS Instant-Trigger</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Settings Overlay */
        #settings {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #222;
            color: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #settings.hidden {
            display: none;
        }
        .form-group {
            margin-bottom: 15px;
            width: 100%;
            max-width: 300px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
        }
        #saveBtn {
            padding: 15px;
            width: 100%;
            max-width: 300px;
            background: #007bff;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
        }

        /* Main Button */
        #triggerBtn {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; /* Default offline */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-transform: uppercase;
            transition: none; /* STRICT NO TRANSITIONS */
        }
        
        #triggerBtn.ready {
            background-color: #28a745; /* Green */
        }
        
        #triggerBtn.recording {
            background-color: #dc3545; /* Red */
        }

        /* Status Log */
        #statusLog {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* Ignore taps */
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        
        #connectionStatus {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #aaa;
            font-size: 12px;
            z-index: 10;
        }
        
        #topRightControls {
            position: absolute;
            top: 10px;
            right: 10px;
            left: 10px; /* Allow full width to wrap properly */
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
            pointer-events: none; /* Let clicks pass through empty space */
        }
        #topRightControls button {
            pointer-events: auto; /* Re-enable clicks on the buttons */
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #clearSettingsBtn {
            background: rgba(255,255,255,0.2);
        }

        #qrBtn {
            background: rgba(0, 123, 255, 0.5);
            display: none; /* hidden by default */
        }

        #benchmarkBtn {
            background: rgba(156, 39, 176, 0.8);
            display: none;
        }
        
        #benchmarkToggleBtn {
            background: rgba(255, 165, 0, 0.5);
            display: none;
        }

        #qrModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #qrModal.hidden {
            display: none;
        }
        #qrModal img {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #closeQrBtn {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        #benchmarkModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #benchmarkModal.hidden {
            display: none;
        }
        #benchmarkModal .results {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            color: white;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #benchmarkModal h3 {
            margin: 0 0 20px 0;
            font-size: 24px;
            color: #fff;
        }
        #benchmarkModal .stat {
            margin: 15px 0;
            font-size: 14px;
            color: #ccc;
        }
        #benchmarkModal .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
        }
        #benchmarkModal .progress {
            margin: 20px 0;
            color: #aaa;
            font-size: 18px;
        }
        #benchmarkModal .iterations-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        #benchmarkModal .iterations-input {
            width: 80px;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: white;
            text-align: center;
            margin-left: 10px;
        }
        #runBenchmarkBtn {
            padding: 15px 30px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        #closeBenchmarkBtn {
            padding: 12px 20px;
            background: #444;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }
        #benchmarkResultsGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="settings">
        <h2>OBS Connection</h2>
        <div class="form-group">
            <label>IP Address</label>
            <input type="text" id="ipInput" placeholder="192.168.1.100" />
        </div>
        <div class="form-group">
            <label>Port</label>
            <input type="number" id="portInput" placeholder="4455" value="4455" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="passInput" placeholder="Leave blank if none" />
        </div>
        <button id="saveBtn">Connect</button>
    </div>

    <div id="connectionStatus">Disconnected</div>
    <div id="topRightControls">
        <button id="benchmarkBtn">Benchmark</button>
        <button id="benchmarkToggleBtn">Lat. Test</button>
        <button id="qrBtn">Share QR</button>
        <button id="clearSettingsBtn">Clear Config</button>
    </div>

    <div id="benchmarkModal" class="hidden">
        <div class="results">
            <h3>Network Benchmark</h3>
            <div class="iterations-row">
                <label style="font-size: 16px; font-weight: bold;">Iterations:</label>
                <input type="number" id="benchmarkIterations" class="iterations-input" value="100" min="1" max="1000">
            </div>
            <button id="runBenchmarkBtn">Run Benchmark</button>
            <div id="benchmarkProgress" class="progress" style="display: none;"></div>
            <div id="benchmarkResults" style="display: none;">
                <div id="benchmarkResultsGrid">
                    <div class="stat">
                        <div class="stat-value" id="benchAvg">-- ms</div>
                        <div>Average</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="benchMin">-- ms</div>
                        <div>Min</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="benchMax">-- ms</div>
                        <div>Max</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="benchTotal">-- ms</div>
                        <div>Total Time</div>
                    </div>
                </div>
            </div>
            <button id="closeBenchmarkBtn">Close</button>
        </div>
    </div>


    <div id="qrModal" class="hidden">
        <img id="qrImage" src="" alt="QR Code" />
        <button id="closeQrBtn">Close</button>
    </div>

    <div id="triggerBtn">
        <span id="btnText">CONNECTING</span>
    </div>

    <div id="statusLog">
        <div class="stat-item">
            <span class="stat-value" id="valDisk">-- GB</span>
            <span>Disk Space</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="valDropped">0</span>
            <span>Dropped</span>
        </div>
    </div>

    <script>
        const settingsEl = document.getElementById('settings');
        const triggerBtn = document.getElementById('triggerBtn');
        const btnText = document.getElementById('btnText');
        const connectionStatus = document.getElementById('connectionStatus');
        const benchmarkBtn = document.getElementById('benchmarkToggleBtn');
        
        let ws = null;
        let isRecording = false;
        let isConnected = false;
        let t0 = 0; // Benchmark start time
        let benchmarking = false;

        // Parse URL params for easy sharing setup
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('ip')) {
            localStorage.setItem('obs_ip', urlParams.get('ip'));
            localStorage.setItem('obs_port', urlParams.get('port') || '4455');
            localStorage.setItem('obs_pass', urlParams.get('pass') || '');
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Show QR Button if on PC (simple check: ontouchstart not in window)
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        if (!isTouchDevice) {
            document.getElementById('qrBtn').style.display = 'block';
        }
        benchmarkBtn.style.display = 'block';
        document.getElementById('benchmarkBtn').style.display = 'block';

        // Benchmark Modal
        const benchmarkModal = document.getElementById('benchmarkModal');
        const benchmarkProgress = document.getElementById('benchmarkProgress');
        const benchmarkResults = document.getElementById('benchmarkResults');
        const runBenchmarkBtn = document.getElementById('runBenchmarkBtn');

        document.getElementById('benchmarkBtn').addEventListener('click', () => {
            benchmarkProgress.style.display = 'none';
            benchmarkResults.style.display = 'none';
            runBenchmarkBtn.style.display = 'block';
            benchmarkModal.classList.remove('hidden');
        });

        document.getElementById('closeBenchmarkBtn').addEventListener('click', () => {
            benchmarkModal.classList.add('hidden');
        });

        runBenchmarkBtn.addEventListener('click', () => {
            if (!isConnected || !ws) return;
            const iterations = parseInt(document.getElementById('benchmarkIterations').value) || 100;
            runBenchmarkBtn.style.display = 'none';
            benchmarkProgress.style.display = 'block';
            benchmarkResults.style.display = 'none';
            benchmarkProgress.innerText = `Running 0/${iterations}...`;
            ws.send(JSON.stringify({ action: 'benchmark', iterations }));
        });

        // Benchmark Mode Toggle
        benchmarkBtn.addEventListener('click', () => {
            benchmarking = !benchmarking;
            benchmarkBtn.style.background = benchmarking ? 'rgba(40,167,69,0.5)' : 'rgba(255,165,0,0.5)';
            if (benchmarking) {
                alert("Benchmark Mode ON.\nTap the giant button to test Latency! Check Developer Console for results or wait for visual feedback.");
            }
        });

        // Generate QR code logic
        document.getElementById('qrBtn').addEventListener('click', async () => {
            const creds = getCreds();
            if (!creds) {
                alert("Please connect to OBS first to generate a sharing QR code.");
                return;
            }
            try {
                const res = await fetch('/api/ip');
                const data = await res.json();
                
                let shareUrl = `${location.protocol}//${data.ip}:${location.port}/?ip=${encodeURIComponent(creds.ip)}`;
                if (creds.port && creds.port !== '4455') {
                    shareUrl += `&port=${encodeURIComponent(creds.port)}`;
                }
                if (creds.pass) {
                    shareUrl += `&pass=${encodeURIComponent(creds.pass)}`;
                }

                // Using qrserver API to generate the QR code
                const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shareUrl)}`;
                document.getElementById('qrImage').src = qrSrc;
                document.getElementById('qrModal').classList.remove('hidden');
            } catch (err) {
                console.error('Failed to get IP', err);
                alert("Could not generate QR code.");
            }
        });

        document.getElementById('closeQrBtn').addEventListener('click', () => {
            document.getElementById('qrModal').classList.add('hidden');
        });

        // Load credentials
        function getCreds() {
            const ip = localStorage.getItem('obs_ip');
            const port = localStorage.getItem('obs_port');
            const pass = localStorage.getItem('obs_pass');
            if (ip && port) return { ip, port, pass: pass || '' };
            return null;
        }

        function saveCreds(ip, port, pass) {
            localStorage.setItem('obs_ip', ip);
            localStorage.setItem('obs_port', port);
            localStorage.setItem('obs_pass', pass);
        }

        function clearCreds() {
            localStorage.removeItem('obs_ip');
            localStorage.removeItem('obs_port');
            localStorage.removeItem('obs_pass');
            location.reload();
        }
        document.getElementById('clearSettingsBtn').addEventListener('click', clearCreds);

        // UI Updates
        function setButtonState(state) {
            triggerBtn.className = '';
            if (state === 'offline') {
                triggerBtn.classList.add('offline');
                btnText.innerText = 'OFFLINE';
            } else if (state === 'ready') {
                triggerBtn.classList.add('ready');
                btnText.innerText = 'READY';
                isRecording = false;
            } else if (state === 'recording') {
                triggerBtn.classList.add('recording');
                btnText.innerText = 'RECORDING';
                isRecording = true;
            }
        }

        // Connection logic
        function connect() {
            const creds = getCreds();
            if (!creds) {
                settingsEl.classList.remove('hidden');
                return;
            }
            settingsEl.classList.add('hidden');
            connectionStatus.innerText = 'Connecting to Relay...';

            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                connectionStatus.innerText = 'Authenticating with OBS...';
                // Send credentials to backend to connect to OBS
                ws.send(JSON.stringify({
                    action: 'connect',
                    ...creds
                }));
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'status') {
                    if (msg.connected) {
                        isConnected = true;
                        connectionStatus.innerText = 'Connected';
                        if (msg.recording) {
                            setButtonState('recording');
                        } else {
                            setButtonState('ready');
                        }
                    } else {
                        isConnected = false;
                        connectionStatus.innerText = 'OBS Disconnected';
                        setButtonState('offline');
                    }
                } else if (msg.type === 'stats') {
                    if (msg.diskSpace !== undefined) {
                        document.getElementById('valDisk').innerText = msg.diskSpace.toFixed(1) + ' GB';
                    }
                    if (msg.droppedFrames !== undefined) {
                        document.getElementById('valDropped').innerText = msg.droppedFrames;
                    }
                } else if (msg.type === 'benchmark_result') {
                    if (benchmarking && t0 > 0) {
                        const t1 = performance.now();
                        console.log(`Command Acknowledged by Bun Server in: ${(t1 - t0).toFixed(3)}ms (Bun Internal processing: ${msg.timeMs.toFixed(3)}ms)`);
                    }
                } else if (msg.type === 'benchmark_progress') {
                    benchmarkProgress.innerText = `Running ${msg.current}/${msg.total}...`;
                } else if (msg.type === 'benchmark_result_full') {
                    document.getElementById('benchAvg').innerText = msg.avgMs.toFixed(3) + ' ms';
                    document.getElementById('benchMin').innerText = msg.minMs.toFixed(3) + ' ms';
                    document.getElementById('benchMax').innerText = msg.maxMs.toFixed(3) + ' ms';
                    document.getElementById('benchTotal').innerText = msg.totalMs.toFixed(3) + ' ms';
                    benchmarkProgress.style.display = 'none';
                    benchmarkResults.style.display = 'block';
                    runBenchmarkBtn.style.display = 'block';
                } else if (msg.type === 'benchmark_error') {
                    benchmarkProgress.innerText = 'Error: ' + msg.message;
                    runBenchmarkBtn.style.display = 'block';
                } else if (msg.type === 'error') {
                    connectionStatus.innerText = 'Error: ' + msg.message;
                    setButtonState('offline');
                    if (msg.message.includes('Authentication Failed')) {
                        clearCreds();
                    }
                }
            };

            ws.onclose = () => {
                isConnected = false;
                connectionStatus.innerText = 'Relay Disconnected';
                setButtonState('offline');
                ws = null;
                // Silent Reconnect every 500ms
                setTimeout(connect, 500);
            };

            ws.onerror = () => {
                if (ws) ws.close();
            };
        }

        // Settings Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            const ip = document.getElementById('ipInput').value.trim();
            const port = document.getElementById('portInput').value.trim();
            const pass = document.getElementById('passInput').value;
            if (ip && port) {
                saveCreds(ip, port, pass);
                connect();
            }
        });

        // The "Instant" Trigger
        triggerBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent 300ms delay & default behaviors
            if (!isConnected || !ws) return;

            // Optimistic UI Update
            if (isRecording) {
                setButtonState('ready'); // Instantly turn green
            } else {
                setButtonState('recording'); // Instantly turn red
            }

            // Fire command to backend instantly
            if (benchmarking) t0 = performance.now();
            ws.send(JSON.stringify({ action: 'toggle' }));
        }, { passive: false });

        // Fallback for desktop testing (mousedown instead of click for speed)
        triggerBtn.addEventListener('mousedown', (e) => {
            if (e.pointerType === 'touch') return; // Handled by touchstart
            e.preventDefault();
            if (!isConnected || !ws) return;

            if (benchmarking) t0 = performance.now();
            
            if (isRecording) {
                setButtonState('ready');
            } else {
                setButtonState('recording');
            }
            ws.send(JSON.stringify({ action: 'toggle' }));
        });

        // Start connection loop
        const saved = getCreds();
        if (saved) {
            document.getElementById('ipInput').value = saved.ip;
            document.getElementById('portInput').value = saved.port;
            document.getElementById('passInput').value = saved.pass;
        }
        connect();
    </script>
</body>
</html>
